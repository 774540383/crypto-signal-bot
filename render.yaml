services:
  - type: web
    name: crypto-signal-bot
    env: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    healthCheckPath: "/ping"
    plan: free
    
    envVars:
      # Required
      - key: BOT_TOKEN
        value: "8914432990:AAH3Aw-jscK5_GJ-eE5CF5qw9xYcC7Z8BRM"
      - key: CHAT_ID
        value: "8523442119"
      
      # Trading Configuration
      - key: SYMBOLS
        value: "BTCUSDT,ETHUSDT,SOLUSDT"
      - key: MIN_SCORE
        value: "70"
      - key: ATR_MULT
        value: "1.5"
      - key: RISK_PCT
        value: "0.02"
      - key: ACCOUNT_SIZE
        value: "100"
      - key: MAX_DAILY_SIGNALS
        value: "3"
      - key: MAX_DAILY_LOSSES
        value: "3"
      - key: COOLDOWN_MINUTES
        value: "45"
      
      # Server Configuration
      - key: CHECK_INTERVAL_SECONDS
        value: "300"
      - key: PORT
        value: "10000"
