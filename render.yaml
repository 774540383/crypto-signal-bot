services:
  - type: web
    name: crypto-signal-bot
    env: python
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python bot.py"
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: CHAT_ID
        sync: false
      - key: SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT
      - key: CHECK_INTERVAL_SECONDS
        value: "300"
      - key: MIN_SCORE
        value: "70"
      - key: ACCOUNT_SIZE
        value: "100"
      - key: RISK_PCT
        value: "0.02"
